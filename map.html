<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Kartvy - Fiende (Mtrl-mappning)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-mgrs@0.3.0/css/leaflet-mgrs.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; background: #222; scroll-behavior: auto !important; }

        * {
            box-sizing: border-box;
        }
        #time-control {
            background: #f5f5f5;
            border-bottom: 2px solid #333;
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;      /* never shrink so map can't push it off-screen */
            z-index: 2000;
        }

        #app { display: flex; flex-direction: column; height: 100vh; width: 100%; overflow: hidden; }

        #map-container { flex: 1 1 0; min-height: 0; display: flex; }
        #map { flex-grow: 1; min-height: 0; }

        #sidebar {
            width: 440px;
            background: #fdfdfd;
            border-left: 1px solid #bbb;
            display: flex;
            flex-direction: column;
            padding: 15px;
            z-index: 1000;
            box-shadow: -2px 0 5px rgba(0,0,0,0.2);
            overflow: hidden;   /* contain children; obs-list scrolls internally */
            min-height: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ddd;
        }

        .sidebar-header h3 {
            margin: 0;
            font-size: 16px;
        }

        .btn-back {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .btn-back:hover { background: #0056b3; }

        textarea { width: 100%; height: 60px; margin-bottom: 10px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; padding: 5px; box-sizing: border-box; }
        .obs-list { flex-grow: 1; overflow-y: auto; margin-top: 15px; }

        /* GeoJSON layer panel */
        .geojson-panel { border-top: 1px solid #ddd; padding-top: 10px; margin-top: 8px; flex-shrink: 0; }
        .geojson-panel h4 { margin: 0 0 8px; font-size: 13px; color: #444; }
        .geojson-upload-btn {
            display: inline-block; padding: 6px 12px; background: #28a745; color: white;
            border-radius: 4px; font-size: 12px; cursor: pointer; border: none; width: 100%;
            text-align: center; margin-bottom: 6px;
        }
        .geojson-upload-btn:hover { background: #1e7e34; }
        .geojson-layer-item {
            display: flex; align-items: center; gap: 6px; padding: 5px 8px;
            background: #f8f8f8; border: 1px solid #ddd; border-radius: 4px;
            margin-bottom: 4px; font-size: 12px;
        }
        .geojson-layer-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .geojson-layer-toggle { cursor: pointer; font-size: 14px; }
        .geojson-layer-remove { cursor: pointer; color: #c00; font-size: 14px; margin-left: 2px; }
        .geojson-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

        .obs-item {
            background: #fff; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px;
            border-radius: 6px; font-size: 13px;
        }

        .edit-group { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
        .edit-group label { font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; }
        .edit-group input { padding: 4px; border: 1px solid #ddd; border-radius: 3px; font-family: monospace; font-size: 11px; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .external-link { font-size: 11px; color: #007bff; text-decoration: none; font-weight: bold; }
        .external-link:hover { text-decoration: underline; }

        button { cursor: pointer; border-radius: 4px; }
        .btn-add { background: #28a745; color: white; border: none; padding: 10px; font-weight: bold; width: 100%; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 4px 8px; font-size: 11px; }

        .time-label {
            font-weight: bold;
            font-size: 14px;
            min-width: 60px;
        }

        .time-display {
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
            min-width: 80px;
        }

        .slider-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
            position: relative;
            padding: 0 10px;
        }

        .slider-wrapper {
            position: relative;
            flex-grow: 1;
            height: 30px;
            display: flex;
            align-items: center;
        }

        .slider-track-bg {
            position: absolute;
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        .slider-track-active {
            position: absolute;
            height: 8px;
            background: #007bff;
            border-radius: 4px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            pointer-events: all;
            cursor: grab;
        }

        .time-slider {
            position: absolute;
            width: 100%;
            height: 30px;
            top: 0;
            left: 0;
            background: none;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            z-index: 5;
            pointer-events: none;
        }

        .time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #007bff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            pointer-events: all;
            border: 2px solid white;
        }

        .time-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #007bff;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            pointer-events: all;
        }

        .time-slider::-moz-range-track {
            background: none;
            border: none;
        }

        .time-range-display {
            font-size: 12px;
            color: #666;
            min-width: 100px;
        }

        .leaflet-popup {
            scroll-behavior: auto !important;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="time-control">
        <span class="time-label">🕐 Tid:</span>
        <div class="time-display" id="currentTime">--:-- - --:--</div>
        <div class="slider-container">
            <div class="slider-wrapper">
                <div class="slider-track-bg"></div>
                <div class="slider-track-active" id="sliderTrackActive" style="left: 0%; right: 0%;"></div>
                <input type="range" id="timeSliderStart" class="time-slider" min="0" max="1440" value="0">
                <input type="range" id="timeSliderEnd" class="time-slider" min="0" max="1440" value="1440">
            </div>
        </div>
        <div class="time-range-display" id="timeRange">00:00 - 23:59</div>
        <span id="mapSourceBadge" style="font-size:12px; color:#666; background:#eee; padding:4px 10px; border-radius:12px; white-space:nowrap;">🗺️ Laddar...</span>
    </div>
    <div id="map-container">
        <div id="map"></div>
        <div id="sidebar">
            <div class="sidebar-header">
                <h3>🗺️ Kartvy</h3>
                <a href="index.html" class="btn-back">← Tillbaka</a>
            </div>

            <div class="obs-list" id="obsList"></div>

            <div class="geojson-panel">
                <h4>🗂️ GeoJSON-lager</h4>
                <label class="geojson-upload-btn">
                    ＋ Ladda upp GeoJSON
                    <input type="file" id="geojsonFileInput" accept=".geojson,.json" multiple style="display:none">
                </label>
                <div id="geojsonLayerList"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-mgrs@0.3.0/js/leaflet-mgrs.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/milsymbol@2.0.0/dist/milsymbol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mgrs@1.0.0/dist/mgrs.js"></script>

<script>
    if (typeof L === 'undefined') {
        document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:red;"><h2>Fel: Leaflet kunde inte laddas</h2><p>Kontrollera din internetanslutning och ladda om sidan.</p></div>';
        throw new Error('Leaflet (L) is not defined — CDN load failed');
    }

    const user = "";
    const pass = "";
    const lmUrl = "https://maps.lantmateriet.se/open/topowebb-ccby/v1/wmts/1.0.0/topowebb/default/3857/{z}/{y}/{x}.png";

    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    });

    L.TileLayer.Auth = L.TileLayer.extend({
        createTile: function(coords, done) {
            const tile = document.createElement('img');
            const authHeader = 'Basic ' + btoa(user + ':' + pass);
            fetch(this.getTileUrl(coords), { headers: { 'Authorization': authHeader } })
                .then(r => {
                    if (!r.ok) throw new Error('tile fetch failed');
                    return r.blob();
                })
                .then(b => { tile.src = URL.createObjectURL(b); done(null, tile); })
                .catch(e => done(e));
            return tile;
        }
    });

    const map = L.map('map').setView([58.4, 15.6], 10);

    // Try Lantmäteriet first; fall back to OSM if a test tile fails (e.g. CORS outside nginx)
    const lmLayer = new L.TileLayer.Auth(lmUrl, { maxZoom: 18, attribution: '© Lantmäteriet' });

    // Probe one tile to detect CORS/auth failure quickly
    const testUrl = lmUrl.replace('{z}', '8').replace('{y}', '141').replace('{x}', '142');
    fetch(testUrl, { headers: { 'Authorization': 'Basic ' + btoa(user + ':' + pass) } })
        .then(r => {
            if (r.ok) {
                lmLayer.addTo(map);
                document.getElementById('mapSourceBadge').textContent = '🗺️ Lantmäteriet';
            } else {
                throw new Error('not ok');
            }
        })
        .catch(() => {
            osmLayer.addTo(map);
            document.getElementById('mapSourceBadge').textContent = '🗺️ OpenStreetMap';
        });

    // Add MGRS grid
    try {
        L.latlngGraticule({
            showLabel: true,
            zoomInterval: [
                { start: 0, end: 2, interval: 40 },
                { start: 3, end: 4, interval: 20 },
                { start: 5, end: 8, interval: 10 },
                { start: 9, end: 10, interval: 5 },
                { start: 11, end: 20, interval: 1 }
            ]
        }).addTo(map);
    } catch (e) {
        console.log('MGRS grid not available');
    }

    let observations = JSON.parse(sessionStorage.getItem('my_obs')) || [];
    let mapLayers = L.layerGroup().addTo(map);
    let windowStartTime = 0;
    let windowEndTime = 1440;
    let minTimeMinutes = 0;
    let maxTimeMinutes = 1440;

    // Convert TNR (DDHHMM or HHMM) to absolute minutes, including day
    function parseTNRtoMinutes(tnrStr) {
        if (!tnrStr) return 0;
        let cleaned = String(tnrStr).replace(/\s+/g, '');
        // Normalise spurious leading zero from spreadsheets (7 digits → last 6)
        if (cleaned.length === 7) cleaned = cleaned.substring(1);
        let day = 0, hh = 0, mm = 0;
        if (cleaned.length >= 6) {
            day = parseInt(cleaned.substring(0, 2)) || 0;
            hh  = parseInt(cleaned.substring(2, 4)) || 0;
            mm  = parseInt(cleaned.substring(4, 6)) || 0;
        } else if (cleaned.length >= 4) {
            hh  = parseInt(cleaned.substring(0, 2)) || 0;
            mm  = parseInt(cleaned.substring(2, 4)) || 0;
        }
        return day * 24 * 60 + hh * 60 + mm;
    }

    // Convert absolute minutes back to TNR string, wrapping day within current month
    function minutesToTNR(totalMinutes, baseDay, daysInMonth) {
        const dayOffset   = Math.floor(totalMinutes / (24 * 60));
        const remaining   = totalMinutes % (24 * 60);
        const hh = Math.floor(remaining / 60);
        const mm = remaining % 60;
        const calDay = ((baseDay - 1 + dayOffset) % daysInMonth) + 1;
        return String(calDay).padStart(2, '0')
             + String(hh).padStart(2, '0')
             + String(mm).padStart(2, '0');
    }

    // Format absolute minutes as "DD HH:MM" TNR display string
    function minutesToTNRDisplay(totalMinutes) {
        if (!observations.length) {
            // Fallback if no data: just HH:MM
            return String(Math.floor(totalMinutes / 60)).padStart(2,'0') + ':'
                 + String(totalMinutes % 60).padStart(2,'0');
        }
        const firstObs = observations.reduce((a, b) =>
            parseTNRtoMinutes(a.tnr) <= parseTNRtoMinutes(b.tnr) ? a : b);
        const firstTNR = String(firstObs.tnr).replace(/\s+/g, '');
        const baseDay = firstTNR.length >= 6 ? (parseInt(firstTNR.substring(0, 2)) || 1) : 1;
        const now = new Date();
        const dim = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const t = minutesToTNR(totalMinutes, baseDay, dim);
        return t.substring(0,2) + '\u00a0' + t.substring(2,4) + ':' + t.substring(4,6);
    }



    function initializeTimeScale() {
        // Find min and max time from observations
        let minTime = Infinity;
        let maxTime = -Infinity;

        observations.forEach(obs => {
            const minutes = parseTNRtoMinutes(obs.tnr);
            if (minutes > 0) {
                minTime = Math.min(minTime, minutes);
                maxTime = Math.max(maxTime, minutes);
            }
        });

        if (minTime !== Infinity && maxTime !== -Infinity) {
            minTimeMinutes = minTime;
            maxTimeMinutes = maxTime;
        } else {
            minTimeMinutes = 0;
            maxTimeMinutes = 1440;
        }

        const sliderStart = document.getElementById('timeSliderStart');
        const sliderEnd = document.getElementById('timeSliderEnd');
        sliderStart.min = minTimeMinutes;
        sliderStart.max = maxTimeMinutes;
        sliderStart.value = minTimeMinutes;
        sliderEnd.min = minTimeMinutes;
        sliderEnd.max = maxTimeMinutes;
        sliderEnd.value = maxTimeMinutes;

        windowStartTime = minTimeMinutes;
        windowEndTime = maxTimeMinutes;

        updateTimeDisplay();
    }

    function updateTimeDisplay() {
        document.getElementById('currentTime').textContent = `${minutesToTNRDisplay(windowStartTime)} – ${minutesToTNRDisplay(windowEndTime)}`;
        document.getElementById('timeRange').textContent = `${minutesToTNRDisplay(minTimeMinutes)} – ${minutesToTNRDisplay(maxTimeMinutes)}`;

        // Update active track visualization
        const sliderStart = document.getElementById('timeSliderStart');
        const sliderEnd = document.getElementById('timeSliderEnd');
        const trackActive = document.getElementById('sliderTrackActive');

        const min = parseInt(sliderStart.min);
        const max = parseInt(sliderStart.max);
        const range = max - min;

        const startPercent = ((windowStartTime - min) / range) * 100;
        const endPercent = ((windowEndTime - min) / range) * 100;

        trackActive.style.left = startPercent + '%';
        trackActive.style.right = (100 - endPercent) + '%';
    }

    function filterObservationsByTime() {
        // Return only observations within the time window
        return observations.filter(obs => {
            const obsTime = parseTNRtoMinutes(obs.tnr);
            return obsTime >= windowStartTime && obsTime <= windowEndTime;
        });
    }

    function renderSidebar() {
        const listDiv = document.getElementById('obsList');
        const visibleObs = filterObservationsByTime();
        listDiv.innerHTML = "";

        visibleObs.forEach((obs, visibleIndex) => {
            const originalIndex = observations.indexOf(obs);
            const genUrl = `https://spatialillusions.com/unitgenerator/#${obs.sidc}`;
            const item = document.createElement('div');
            item.className = 'obs-item';
            item.innerHTML = `
                <div onclick="goTo(${originalIndex})" style="cursor:pointer">
                    <strong>#${obs.lopnummer}</strong> (TNR: ${obs.tnr}) - ${obs.mtrl || 'Okänd'}
                    <br><small style="color:#666">${obs.info}</small>
                </div>
                <div class="edit-group">
                    <label>Koordinat (MGRS)</label>
                    <input type="text" value="${obs.koordinater || ''}" onchange="updateField(${originalIndex}, 'koordinater', this.value)">
                    <label>Plats</label>
                    <input type="text" value="${obs.pos || ''}" onchange="updateField(${originalIndex}, 'pos', this.value)">
                    <label>SIDC (Symbolkod)</label>
                    <input type="text" value="${obs.sidc}" onchange="updateField(${originalIndex}, 'sidc', this.value)">
                </div>
                <div class="controls">
                    <a href="${genUrl}" target="_blank" class="external-link">⚙️ Öppna i generator</a>
                    <button class="btn-del" onclick="removeObs(${originalIndex})">Ta bort</button>
                </div>
            `;
            listDiv.appendChild(item);
        });

        if (visibleObs.length === 0) {
            listDiv.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">Inga rapporter vid denna tid</div>';
        }
    }

    function renderMarkers() {
        mapLayers.clearLayers();
        const visibleObs = filterObservationsByTime();
        const posGroups = {};
        visibleObs.forEach(obs => {
            const actualCoords = getCoords(obs.koordinater || obs.pos);
            if (!actualCoords) return;
            const key = actualCoords.toString();
            if (!posGroups[key]) posGroups[key] = [];
            posGroups[key].push({ obs, actualCoords });
        });

        Object.keys(posGroups).forEach(key => {
            const group = posGroups[key];
            const centerCoords = group[0].actualCoords;
            const count = group.length;

            group.forEach((item, index) => {
                let displayCoords = centerCoords;
                if (count > 1) {
                    const radius = 0.004;
                    const angle = (index / count) * (2 * Math.PI);
                    displayCoords = [centerCoords[0] + radius * Math.cos(angle), centerCoords[1] + radius * Math.sin(angle)];
                    L.polyline([displayCoords, centerCoords], { color: '#ff4d4d', weight: 1.5, dashArray: '4, 6' }).addTo(mapLayers);
                }
                // Ensure hostile affiliation (digit index 2 = '6'). Correct stored SIDCs that
                // were generated with the old friendly-default bug ('3' -> '6').
                const sidc = (function(s) {
                    if (!s || s.length < 4) return s;
                    const typ = (item.obs.typ || '').trim().toLowerCase();
                    const isFriendly = (typ === '7e' || typ === 'egna' || typ === 'friendly' || typ === 'f');
                    if (!isFriendly && s[2] === '3') return s.substring(0, 2) + '6' + s.substring(3);
                    return s;
                })(item.obs.sidc);
                const sym = new ms.Symbol(sidc, { size: 30, uniqueDesignation: item.obs.lopnummer });
                L.marker(displayCoords, {
                    icon: L.divIcon({ className: '', html: sym.asSVG(), iconAnchor: [sym.getAnchor().x, sym.getAnchor().y] })
                }).bindPopup(function() {
                        const o = item.obs;
                        const mgrsStr = centerCoords ? latLngToMGRS(centerCoords[0], centerCoords[1]) : null;
                        const row = (label, val) => val ? '<tr><td style="color:#888;font-size:11px;padding:2px 6px 2px 0;white-space:nowrap;vertical-align:top"><b>' + label + '</b></td><td style="font-size:12px;padding:2px 0;">' + val + '</td></tr>' : '';
                        return '<div style="min-width:220px;max-width:320px;">' +
                            '<div style="font-size:14px;font-weight:bold;margin-bottom:6px;border-bottom:1px solid #ddd;padding-bottom:4px;">' +
                                '📋 Rapport #' + o.lopnummer +
                            '</div>' +
                            '<table style="border-collapse:collapse;width:100%">' +
                                row('Mtrl', o.mtrl) +
                                row('TNR', o.tnr) +
                                row('Från', o.från) +
                                row('Org', o.org) +
                                row('Info', o.info) +
                                row('Plats', o.pos) +
                                row('Koord', mgrsStr || o.koordinater) +
                                row('Tillf.', o.tillförlitlighet) +
                                row('Sakr.', o.sakriktighet) +
                                row('Ref', o.referenser) +
                                row('Kommentar', o.kommentar) +
                                row('Bedömning', o.bedömning) +
                            '</table>' +
                        '</div>';
                    }, { maxWidth: 340, maxHeight: 400 }).addTo(mapLayers);
            });
        });
    }

    function saveAndRender() {
        sessionStorage.setItem('my_obs', JSON.stringify(observations));
        renderSidebar();
        renderMarkers();
    }

    function updateField(index, field, value) {
        observations[index][field] = value.trim();
        saveAndRender();
    }

    function removeObs(index) {
        observations.splice(index, 1);
        saveAndRender();
    }

    function goTo(index) {
        const coords = getCoords(observations[index].koordinater || observations[index].pos);
        if(coords) map.flyTo(coords, 13);
    }

    function getCoords(mgrsStr) {
        if (!mgrsStr) { console.warn('getCoords: empty input'); return null; }
        const clean = mgrsStr.replace(/\s+/g, '');
        const prefix = clean.match(/^(\d{1,2}[A-Z]{3})/)?.[1] || '';
        const digits = clean.substring(prefix.length);
        const attempts = [];
        for (let len = digits.length % 2 === 0 ? digits.length : digits.length - 1; len >= 2; len -= 2) {
            attempts.push(prefix + digits.substring(0, len));
        }
        if (!attempts.length) attempts.push(clean);
        for (const attempt of attempts) {
            try {
                const p = mgrs.toPoint(attempt);
                if (p && !isNaN(p[0]) && !isNaN(p[1])) {
                    console.log('getCoords OK:', mgrsStr, '->', attempt, '->', p);
                    return [p[1], p[0]];
                }
            } catch (e) {
                console.warn('getCoords fail:', attempt, e.message);
            }
        }
        console.error('getCoords: all attempts failed for', mgrsStr);
        return null;
    }

    function debugObservations() {
        console.group('=== Observation Debug ===');
        console.log('Total observations:', observations.length);
        observations.forEach(o => {
            console.log(`#${o.lopnummer} TNR="${o.tnr}" koordinater="${o.koordinater}" pos="${o.pos}" mtrl="${o.mtrl}"`);
        });
        console.log('windowStartTime:', windowStartTime, 'windowEndTime:', windowEndTime);
        const vis = filterObservationsByTime();
        console.log('Visible after time filter:', vis.length);
        vis.forEach(o => console.log(`  visible: #${o.lopnummer} t=${parseTNRtoMinutes(o.tnr)} koord="${o.koordinater}"`));
        console.groupEnd();
    }

    // Initialize time scale first so window covers all observations
    initializeTimeScale();

    renderSidebar();
    renderMarkers();
    debugObservations();

    // Time slider event listeners
    document.getElementById('timeSliderStart').addEventListener('input', (e) => {
        let startValue = parseInt(e.target.value);
        const endValue = parseInt(document.getElementById('timeSliderEnd').value);

        // Prevent start from going past end
        if (startValue > endValue) {
            startValue = endValue;
            e.target.value = endValue;
        }

        windowStartTime = startValue;
        updateTimeDisplay();
        renderSidebar();
        renderMarkers();
    });

    document.getElementById('timeSliderEnd').addEventListener('input', (e) => {
        let endValue = parseInt(e.target.value);
        const startValue = parseInt(document.getElementById('timeSliderStart').value);

        // Prevent end from going before start
        if (endValue < startValue) {
            endValue = startValue;
            e.target.value = startValue;
        }

        windowEndTime = endValue;
        updateTimeDisplay();
        renderSidebar();
        renderMarkers();
    });

    // Drag the blue active track to move the entire time window
    const sliderTrackActive = document.getElementById('sliderTrackActive');
    const sliderWrapper = document.querySelector('.slider-wrapper');
    let isDraggingTrack = false;
    let dragStartX = 0;
    let dragStartTimeStart = 0;
    let dragStartTimeEnd = 0;

    sliderTrackActive.addEventListener('mousedown', (e) => {
        isDraggingTrack = true;
        dragStartX = e.clientX;
        dragStartTimeStart = windowStartTime;
        dragStartTimeEnd = windowEndTime;
        sliderTrackActive.style.cursor = 'grabbing';
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDraggingTrack) return;

        const sliderStart = document.getElementById('timeSliderStart');
        const sliderEnd = document.getElementById('timeSliderEnd');
        const wrapperRect = sliderWrapper.getBoundingClientRect();
        const wrapperWidth = wrapperRect.width;
        const min = parseInt(sliderStart.min);
        const max = parseInt(sliderStart.max);
        const range = max - min;
        const windowDuration = dragStartTimeEnd - dragStartTimeStart;

        // Calculate pixel movement
        const deltaX = e.clientX - dragStartX;
        const deltaMinutes = (deltaX / wrapperWidth) * range;

        // Calculate new start and end times
        let newStart = dragStartTimeStart + deltaMinutes;
        let newEnd = dragStartTimeEnd + deltaMinutes;

        // Prevent going beyond bounds
        if (newStart < min) {
            newStart = min;
            newEnd = min + windowDuration;
        }
        if (newEnd > max) {
            newEnd = max;
            newStart = max - windowDuration;
        }

        windowStartTime = Math.round(newStart);
        windowEndTime = Math.round(newEnd);

        sliderStart.value = windowStartTime;
        sliderEnd.value = windowEndTime;

        updateTimeDisplay();
        renderSidebar();
        renderMarkers();
    });

    document.addEventListener('mouseup', () => {
        isDraggingTrack = false;
        sliderTrackActive.style.cursor = 'grab';
    });

    // ── GeoJSON layer management ──────────────────────────────────────────────
    const GEOJSON_COLORS = ['#e63946','#2196F3','#ff9800','#9c27b0','#00bcd4',
                             '#4caf50','#ff5722','#607d8b','#795548','#009688'];
    let geojsonLayers = [];

    function styleForGeojson(feature, color) {
        const t = (feature.geometry || {}).type || '';
        if (t === 'Point' || t === 'MultiPoint') return {};
        const typ = ((feature.properties || {}).typ || '').toLowerCase();
        const dashed = typ.includes('suav') || typ.includes('streckad') || typ.includes('dashed');
        return {
            color: color, weight: 2.5, opacity: 0.9,
            fillOpacity: dashed ? 0.05 : 0.12, fillColor: color,
            dashArray: dashed ? '8 6' : null
        };
    }

    // Convert latlng to MGRS string (5-digit precision = 1m)
    function latLngToMGRS(lat, lng) {
        try {
            // mgrs.js forward([ lng, lat ], precision)
            return mgrs.forward([lng, lat], 5);
        } catch(e) {
            return null;
        }
    }

    // Normalise SIDC: truncate 30-char APP-6B to 20-char APP-6D
    function normaliseSIDC(raw) {
        if (!raw) return '';
        const s = raw.trim();
        if (s.length === 30) return s.substring(0, 20);
        return s;
    }

    // Build a milsymbol marker from a 20-char APP-6D SIDC
    function milsymbolMarker(sidc, latlng, extraOpts) {
        const sym = new ms.Symbol(normaliseSIDC(sidc), Object.assign({ size: 30 }, extraOpts || {}));
        const anchor = sym.getAnchor();
        const icon = L.divIcon({
            className: '',
            html: sym.asSVG(),
            iconSize: [sym.getSize().width, sym.getSize().height],
            iconAnchor: [anchor.x, anchor.y]
        });
        return L.marker(latlng, { icon: icon });
    }

    // Build popup content for a GeoJSON point
    function pointPopupContent(props, latlng) {
        const mgrsStr = latLngToMGRS(latlng.lat, latlng.lng);
        const lines = Object.entries(props)
            .filter(function(kv) { return kv[1] != null && kv[1] !== ''; })
            .map(function(kv) { return '<b>' + kv[0] + ':</b> ' + kv[1]; });
        if (mgrsStr) lines.push('<span style="font-family:monospace;font-size:11px;color:#666;">📍 ' + mgrsStr + '</span>');
        return lines.join('<br>');
    }

    // Render a single point given props + latlng
    function renderSinglePoint(props, latlng, color) {
        const sidc  = props.sidc || props.SIDC || props.symbolcode || props.symbol_id || '';
        const typ   = (props.typ || props.type || props.TYPE || props.kategori || '').toLowerCase().trim();
        const name  = props.name || props.NAME || props.label || props.LABEL || props.designationuniq || '';
        const desig = props.designationuniq || props.uid || name || '';
        let marker = null;

        // ── 1. Explicit SIDC ──────────────────────────────────────────────────
        if (sidc) {
            try {
                marker = milsymbolMarker(sidc, latlng, {
                    uniqueDesignation: desig,
                    additionalInformation: props.info || '',
                    higherFormation: props.higherFormation || ''
                });
            } catch(e) {
                console.warn('GeoJSON milsymbol error for SIDC ' + sidc + ':', e.message);
            }
        }

        // ── 2. typ-based symbols ──────────────────────────────────────────────
        if (!marker && (typ === 'oplats' || typ === 'op')) {
            const icon = L.divIcon({
                className: '',
                html: '<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">' +
                      '<polygon points="8,1 15,15 1,15" fill="' + color + '" stroke="#fff" stroke-width="1.2"/></svg>',
                iconSize: [16, 16],
                iconAnchor: [8, 15]
            });
            marker = L.marker(latlng, { icon: icon });
        }

        if (!marker && (typ === 'uav' || typ === 'suav' || typ === 'drone')) {
            try {
                marker = milsymbolMarker('10031500001212000000', latlng, { uniqueDesignation: desig });
            } catch(e) {}
        }

        // ── 3. Named label ────────────────────────────────────────────────────
        if (!marker && name) {
            const icon = L.divIcon({
                className: '',
                html: '<div style="background:' + color + ';color:#fff;padding:2px 6px;border-radius:3px;' +
                      'font-size:11px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.5);font-weight:600;">' + name + '</div>',
                iconAnchor: [0, 10]
            });
            marker = L.marker(latlng, { icon: icon });
        }

        // ── 4. Circle fallback ────────────────────────────────────────────────
        if (!marker) {
            marker = L.circleMarker(latlng, {
                radius: 5, color: color, fillColor: color, fillOpacity: 0.85, weight: 1.5
            });
        }

        // Bind MGRS popup to every point marker
        marker.bindPopup(function() { return pointPopupContent(props, latlng); });
        return marker;
    }

    function pointToLayerFn(color) {
        return function(feature, latlng) {
            return renderSinglePoint(feature.properties || {}, latlng, color);
        };
    }

    // Leaflet doesn't call pointToLayer for MultiPoint — handle it in onEachFeature
    // Markers are added to the provided group so toggle/remove works correctly
    // Get an approximate centroid latlng for polygon/line features
    function featureCentroid(feature) {
        const geom = feature.geometry;
        if (!geom) return null;
        let coords = [];
        if (geom.type === 'Polygon') coords = geom.coordinates[0];
        else if (geom.type === 'MultiPolygon') coords = geom.coordinates[0][0];
        else if (geom.type === 'LineString') coords = geom.coordinates;
        else if (geom.type === 'MultiLineString') coords = geom.coordinates[0];
        else return null;
        if (!coords.length) return null;
        const sumLng = coords.reduce(function(s, c) { return s + c[0]; }, 0);
        const sumLat = coords.reduce(function(s, c) { return s + c[1]; }, 0);
        return L.latLng(sumLat / coords.length, sumLng / coords.length);
    }

    function onEachFeatureFnWithMultiPoint(color, group) {
        return function(feature, layer) {
            const props = feature.properties || {};
            const geomType = (feature.geometry || {}).type || '';

            // Expand MultiPoint into individual markers added to the group
            if (geomType === 'MultiPoint') {
                feature.geometry.coordinates.forEach(function(coord) {
                    const latlng = L.latLng(coord[1], coord[0]);
                    const marker = renderSinglePoint(props, latlng, color);
                    if (group) group.addLayer(marker);
                    else marker.addTo(map);
                });
            }

            // Label text inside polygons/lines from 'label' or 'name' property
            const labelText = props.label || props.name || props.NAME || '';
            const isShape = geomType === 'Polygon' || geomType === 'MultiPolygon' ||
                            geomType === 'LineString' || geomType === 'MultiLineString';
            if (labelText && isShape) {
                const center = featureCentroid(feature);
                if (center) {
                    const labelIcon = L.divIcon({
                        className: '',
                        html: '<div style="' +
                              'color:' + color + ';' +
                              'font-size:12px;font-weight:700;' +
                              'text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff;' +
                              'white-space:nowrap;pointer-events:none;' +
                              'transform:translate(-50%,-50%);">' + labelText + '</div>',
                        iconSize: [0, 0],
                        iconAnchor: [0, 0]
                    });
                    const labelMarker = L.marker(center, { icon: labelIcon, interactive: false });
                    if (group) group.addLayer(labelMarker);
                    else labelMarker.addTo(map);
                }
            }

            // Popup with properties + all corner/vertex MGRS coordinates on click
            layer.on('click', function(e) {
                const geom = feature.geometry || {};
                const geomType = geom.type || '';
                const lines = Object.entries(props)
                    .filter(function(kv) { return kv[1] != null && kv[1] !== ''; })
                    .map(function(kv) { return '<b>' + kv[0] + ':</b> ' + kv[1]; });

                // Collect coordinates to display based on geometry type
                function coordsForGeom(g) {
                    if (!g) return [];
                    if (g.type === 'Polygon')      return g.coordinates[0] || [];
                    if (g.type === 'MultiPolygon') return g.coordinates[0][0] || [];
                    if (g.type === 'LineString')   return g.coordinates || [];
                    if (g.type === 'MultiLineString') return g.coordinates[0] || [];
                    if (g.type === 'Circle')       return 'circle';
                    return [];
                }

                const coords = coordsForGeom(geom);
                if (coords === 'circle' || geomType === 'Circle') {
                    // Circle: show centre
                    const m = latLngToMGRS(e.latlng.lat, e.latlng.lng);
                    if (m) lines.push('<b>Centrum:</b><br><span style="font-family:monospace;font-size:11px;color:#666;">📍 ' + m + '</span>');
                } else if (coords.length) {
                    // Polygon/Line: show all unique vertices (skip closing duplicate)
                    const unique = coords.filter(function(c, i) {
                        if (i === coords.length - 1) {
                            // skip if same as first (closing coord)
                            return !(c[0] === coords[0][0] && c[1] === coords[0][1]);
                        }
                        return true;
                    });
                    const cornerLines = unique.map(function(c, i) {
                        const m = latLngToMGRS(c[1], c[0]);
                        return '<span style="font-family:monospace;font-size:11px;color:#666;">📍 ' + (m || (c[1].toFixed(5) + ', ' + c[0].toFixed(5))) + '</span>';
                    });
                    if (cornerLines.length) {
                        lines.push('<b>Hörn (' + cornerLines.length + '):</b><br>' + cornerLines.join('<br>'));
                    }
                } else {
                    // Fallback: click location
                    const m = latLngToMGRS(e.latlng.lat, e.latlng.lng);
                    if (m) lines.push('<span style="font-family:monospace;font-size:11px;color:#666;">📍 ' + m + '</span>');
                }

                if (lines.length) L.popup({ maxHeight: 300 }).setLatLng(e.latlng).setContent(lines.join('<br>')).openOn(map);
            });
        };
    }

    function onEachFeatureFn(feature, layer) {
        const props = feature.properties;
        if (!props) return;
        const lines = Object.entries(props)
            .filter(function(kv) { return kv[1] != null && kv[1] !== ''; })
            .map(function(kv) { return '<b>' + kv[0] + ':</b> ' + kv[1]; });
        if (lines.length) layer.bindPopup(lines.join('<br>'));
    }

    function addGeojsonLayer(name, geojsonData, color) {
        const id = Date.now() + Math.random();
        // Use a LayerGroup so MultiPoint markers are tracked together with the GeoJSON layer
        const group = L.layerGroup();
        const geojsonLayer = L.geoJSON(geojsonData, {
            style: function(f) { return styleForGeojson(f, color); },
            pointToLayer: pointToLayerFn(color),
            onEachFeature: onEachFeatureFnWithMultiPoint(color, group)
        });
        group.addLayer(geojsonLayer);
        group.addTo(map);
        geojsonLayers.push({ id: id, name: name, color: color, visible: true, layer: group, data: geojsonData });
        saveGeojsonToSession();
        renderGeojsonList();
        try {
            const b = geojsonLayer.getBounds();
            if (b.isValid()) map.fitBounds(b, { padding: [40, 40], maxZoom: 14 });
        } catch(e) {}
    }

    function removeGeojsonLayer(id) {
        const idx = geojsonLayers.findIndex(function(l) { return l.id === id; });
        if (idx === -1) return;
        map.removeLayer(geojsonLayers[idx].layer);
        geojsonLayers.splice(idx, 1);
        saveGeojsonToSession();
        renderGeojsonList();
    }

    function toggleGeojsonLayer(id) {
        const item = geojsonLayers.find(function(l) { return l.id === id; });
        if (!item) return;
        if (item.visible) { map.removeLayer(item.layer); item.visible = false; }
        else { item.layer.addTo(map); item.visible = true; }
        saveGeojsonToSession();
        renderGeojsonList();
    }

    function renderGeojsonList() {
        const el = document.getElementById('geojsonLayerList');
        if (!geojsonLayers.length) {
            el.innerHTML = '<div style="font-size:11px;color:#999;padding:4px 0;">Inga lager uppladdade</div>';
            return;
        }
        el.innerHTML = geojsonLayers.map(function(item) {
            return '<div class="geojson-layer-item">' +
                '<input type="color" value="' + item.color + '" title="Ändra färg"' +
                '  style="width:20px;height:20px;border:none;border-radius:50%;padding:0;cursor:pointer;flex-shrink:0;background:none;"' +
                '  onchange="changeGeojsonColor(' + item.id + ', this.value)">' +
                '<span title="' + item.name + '">' + item.name + '</span>' +
                '<span class="geojson-layer-toggle" onclick="toggleGeojsonLayer(' + item.id + ')" title="' + (item.visible ? 'Dölj' : 'Visa') + '">' + (item.visible ? '👁️' : '🚫') + '</span>' +
                '<span class="geojson-layer-remove" onclick="removeGeojsonLayer(' + item.id + ')" title="Ta bort">✕</span>' +
                '</div>';
        }).join('');
    }

    function changeGeojsonColor(id, newColor) {
        const item = geojsonLayers.find(function(l) { return l.id === id; });
        if (!item) return;
        item.color = newColor;
        // Rebuild the layer with the new color
        map.removeLayer(item.layer);
        const group = L.layerGroup();
        const geojsonLayer = L.geoJSON(item.data, {
            style: function(f) { return styleForGeojson(f, newColor); },
            pointToLayer: pointToLayerFn(newColor),
            onEachFeature: onEachFeatureFnWithMultiPoint(newColor, group)
        });
        group.addLayer(geojsonLayer);
        if (item.visible) group.addTo(map);
        item.layer = group;
        saveGeojsonToSession();
        renderGeojsonList();
    }

    function saveGeojsonToSession() {
        try {
            const data = geojsonLayers.map(function(l) {
                return { id: l.id, name: l.name, color: l.color, visible: l.visible, data: l.data };
            });
            sessionStorage.setItem('geojson_layers', JSON.stringify(data));
        } catch(e) {}
    }

    function fitMapToAllObjects() {
        const bounds = L.latLngBounds();
        // Include observation markers
        observations.forEach(function(o) {
            const coords = getCoords(o.koordinater || o.pos);
            if (coords) bounds.extend(coords);
        });
        // Include all GeoJSON layers
        geojsonLayers.forEach(function(item) {
            try {
                // Walk through layer group to get bounds
                item.layer.eachLayer(function(l) {
                    if (l.getBounds) {
                        try { bounds.extend(l.getBounds()); } catch(e) {}
                    } else if (l.getLatLng) {
                        bounds.extend(l.getLatLng());
                    }
                });
            } catch(e) {}
        });
        if (bounds.isValid()) {
            map.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
        }
    }

    function loadGeojsonFromSession() {
        try {
            const raw = sessionStorage.getItem('geojson_layers');
            if (!raw) return;
            JSON.parse(raw).forEach(function(d) {
                const group = L.layerGroup();
                const geojsonLayer = L.geoJSON(d.data, {
                    style: function(f) { return styleForGeojson(f, d.color); },
                    pointToLayer: pointToLayerFn(d.color),
                    onEachFeature: onEachFeatureFnWithMultiPoint(d.color, group)
                });
                group.addLayer(geojsonLayer);
                if (d.visible) group.addTo(map);
                geojsonLayers.push({ id: d.id, name: d.name, color: d.color, visible: d.visible, layer: group, data: d.data });
            });
            renderGeojsonList();
        } catch(e) {}
    }

    document.getElementById('geojsonFileInput').addEventListener('change', function(e) {
        Array.from(e.target.files).forEach(function(file) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const geojson = JSON.parse(evt.target.result);
                    const color = GEOJSON_COLORS[geojsonLayers.length % GEOJSON_COLORS.length];
                    addGeojsonLayer(file.name.replace(/\.(geojson|json)$/i, ''), geojson, color);
                } catch(err) {
                    alert('Kunde inte läsa ' + file.name + ': ' + err.message);
                }
            };
            reader.readAsText(file);
        });
        this.value = '';
    });

    loadGeojsonFromSession();
    renderGeojsonList();
    fitMapToAllObjects();



</script>

</body>
</html>
